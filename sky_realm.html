<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sky Realm — Fantasy Shooter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d0a1f; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
#gameContainer {
  width: 100%; max-width: 700px; height: 500px; position: relative;
  background: linear-gradient(180deg, #0d0a1f 0%, #1a0a3a 40%, #2d1060 100%);
  overflow: hidden; cursor: none;
}
@media (max-width: 700px) { #gameContainer { height: 100svh; max-width: 100%; } }
#gameCanvas { position: absolute; top:0; left:0; width:100%; height:100%; }
#ui {
  position: absolute; top: 0; left: 0; width: 100%; padding: 10px 14px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none; z-index: 10;
}
.stat { color: #e8c96a; font-size: 13px; font-weight: 500; text-shadow: 0 0 8px #c8a030; }
#hpBar { width: 90px; height: 8px; background: #3a1a3a; border-radius: 4px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 6px; }
#hpFill { height: 100%; background: #e040a0; border-radius: 4px; transition: width 0.2s; }
#overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 20;
  background: rgba(10,5,30,0.82);
}
#overlay h2 { color: #e8c96a; font-size: 22px; margin-bottom: 8px; text-shadow: 0 0 16px #e8c96a88; }
#overlay p { color: #b090d0; font-size: 13px; margin-bottom: 20px; text-align: center; padding: 0 20px; line-height: 1.7; white-space: pre-line; }
#startBtn {
  background: transparent; border: 1.5px solid #e8c96a; color: #e8c96a;
  padding: 10px 28px; border-radius: 8px; font-size: 14px;
  cursor: pointer; font-family: monospace; letter-spacing: 1px;
}
#startBtn:hover { background: rgba(232,201,106,0.12); }
#mobileControls {
  position: absolute; bottom: 0; left: 0; width: 100%; display: none;
  justify-content: space-between; align-items: flex-end; padding: 10px 10px 14px;
  z-index: 15; pointer-events: none;
}
.dpad { display: grid; grid-template-columns: 44px 44px 44px; grid-template-rows: 44px 44px; gap: 4px; pointer-events: all; }
.dpad button {
  background: rgba(232,201,106,0.18); border: 1px solid rgba(232,201,106,0.35);
  color: #e8c96a; border-radius: 6px; font-size: 18px; cursor: pointer; touch-action: none;
}
#fireBtn {
  width: 68px; height: 68px; border-radius: 50%; background: rgba(224,64,160,0.25);
  border: 2px solid rgba(224,64,160,0.6); color: #e040a0; font-size: 26px;
  cursor: pointer; pointer-events: all; touch-action: none;
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div class="stat">❤️ <span id="hpBar"><span id="hpFill" style="width:100%"></span></span> <span id="hpNum">100</span></div>
    <div class="stat">⭐ <span id="score">0</span></div>
    <div class="stat">Lvl <span id="level">1</span></div>
  </div>
  <div id="overlay">
    <h2>✦ Sky Realm ✦</h2>
    <p>Управляй магом в небесах фэнтези мира.
Уничтожай монстров, собирай кристаллы.

🖥 Мышь / WASD + ЛКМ или Пробел
📱 D-pad + кнопка огня</p>
    <button id="startBtn" onclick="startGame()">НАЧАТЬ ИГРУ</button>
  </div>
  <div id="mobileControls">
    <div class="dpad">
      <div></div>
      <button id="btnUp">▲</button>
      <div></div>
      <button id="btnLeft">◄</button>
      <button id="btnDown">▼</button>
      <button id="btnRight">►</button>
    </div>
    <button id="fireBtn">✦</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gameContainer');

let W, H;
function resize() {
  W = canvas.width = container.clientWidth;
  H = canvas.height = container.clientHeight;
}
resize();
window.addEventListener('resize', resize);

const isMobile = () => 'ontouchstart' in window;

let state = 'menu';
let player, bullets, enemies, particles, crystals;
let score, level, frameCount, lastShot, enemySpawnTimer;
let keys = {};

function initGame() {
  player = { x: 80, y: H/2, w: 32, h: 28, hp: 100, maxHp: 100, speed: 3.5, invTime: 0 };
  bullets = []; enemies = []; particles = []; crystals = [];
  score = 0; level = 1; frameCount = 0; lastShot = 0; enemySpawnTimer = 0;
  updateUI();
}

function updateUI() {
  document.getElementById('hpFill').style.width = (player.hp / player.maxHp * 100) + '%';
  document.getElementById('hpNum').textContent = player.hp;
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
}

const stars = Array.from({length: 70}, () => ({
  x: Math.random() * 800, y: Math.random() * 500,
  r: Math.random() * 1.5 + 0.3, s: Math.random() * 0.3 + 0.1, t: Math.random() * Math.PI * 2
}));

function spawnEnemy() {
  const types = ['bat', 'slime', 'ghost'];
  const t = frameCount > 500 ? types[Math.floor(Math.random() * types.length)] : 'bat';
  const hp = 1 + Math.floor(level * 0.8);
  const spd = 1 + level * 0.15 + Math.random() * 0.5;
  enemies.push({
    x: W + 30, y: 40 + Math.random() * (H - 80),
    type: t, hp, maxHp: hp, speed: spd,
    w: t === 'slime' ? 28 : 22, h: t === 'slime' ? 22 : 24,
    wobble: Math.random() * Math.PI * 2
  });
}

function spawnParticle(x, y, color, count = 6) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 30 + Math.random()*20, color, r: 2 + Math.random()*3 });
  }
}

function fireBullet(auto = false) {
  const cd = auto ? 18 : 12;
  if (frameCount - lastShot < cd) return;
  lastShot = frameCount;
  bullets.push({ x: player.x + player.w, y: player.y + player.h / 2, vx: 9, vy: 0, r: 5, power: 1 });
  spawnParticle(player.x + player.w, player.y + player.h / 2, '#c040ff', 3);
}

function drawPlayer() {
  const { x, y, w, h, invTime } = player;
  if (invTime > 0 && Math.floor(frameCount / 4) % 2 === 0) return;
  ctx.save();
  ctx.translate(x + w / 2, y + h / 2);
  const bob = Math.sin(frameCount * 0.08) * 2;
  ctx.translate(0, bob);
  ctx.fillStyle = '#7030c0';
  ctx.beginPath(); ctx.ellipse(0, 2, 12, 10, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#e8c96a';
  ctx.beginPath(); ctx.arc(0, -6, 8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#c8a030';
  ctx.fillRect(-3, -14, 6, 10);
  ctx.fillStyle = '#a060e0';
  ctx.fillRect(-14, -2, 6, 14);
  ctx.fillRect(8, -2, 6, 14);
  ctx.fillStyle = '#e040a0';
  ctx.beginPath(); ctx.arc(20, 2, 5, 0, Math.PI * 2);
  ctx.shadowColor = '#e040a0'; ctx.shadowBlur = 10;
  ctx.fill(); ctx.shadowBlur = 0;
  ctx.restore();
}

function drawEnemy(e) {
  const { x, y, type } = e;
  ctx.save();
  ctx.translate(x + e.w / 2, y + e.h / 2);
  const wobble = Math.sin(frameCount * 0.1 + e.wobble) * 3;
  if (type === 'bat') {
    ctx.translate(0, wobble);
    ctx.fillStyle = '#602090';
    ctx.beginPath(); ctx.ellipse(0, 0, 10, 7, 0, 0, Math.PI * 2); ctx.fill();
    const flap = Math.sin(frameCount * 0.2) * 0.4;
    ctx.fillStyle = '#401060';
    ctx.save(); ctx.rotate(-0.3 + flap); ctx.beginPath(); ctx.ellipse(-12, -2, 10, 5, Math.PI * 0.1, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    ctx.save(); ctx.rotate(0.3 - flap); ctx.beginPath(); ctx.ellipse(12, -2, 10, 5, -Math.PI * 0.1, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    ctx.fillStyle = '#ff4040'; ctx.beginPath(); ctx.arc(-3, 1, 2, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(3, 1, 2, 0, Math.PI * 2); ctx.fill();
  } else if (type === 'slime') {
    ctx.translate(0, wobble * 0.5);
    ctx.fillStyle = '#20c060';
    ctx.beginPath(); ctx.ellipse(0, 2, 13, 10, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#10a040';
    ctx.beginPath(); ctx.ellipse(0, 0, 10, 8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-4, -1, 3, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(4, -1, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-4, -1, 1.5, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(4, -1, 1.5, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.globalAlpha = 0.75 + Math.sin(frameCount * 0.08) * 0.2;
    ctx.fillStyle = '#8080ff';
    ctx.beginPath(); ctx.ellipse(0, 0, 11, 13, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#4040c0';
    ctx.beginPath(); ctx.ellipse(0, 4, 7, 10, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(-4, -2, 3, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(4, -2, 3, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.restore();
  ctx.fillStyle = '#3a1a3a'; ctx.fillRect(x, y - 8, e.w, 3);
  ctx.fillStyle = '#e040a0'; ctx.fillRect(x, y - 8, e.w * (e.hp / e.maxHp), 3);
}

function drawBullet(b) {
  ctx.save();
  ctx.fillStyle = '#e040a0';
  ctx.shadowColor = '#e040a0'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0; ctx.restore();
}

function drawCrystal(c) {
  ctx.save(); ctx.translate(c.x, c.y);
  ctx.rotate(frameCount * 0.04);
  ctx.fillStyle = '#40e0ff';
  ctx.shadowColor = '#40e0ff'; ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(0, -8); ctx.lineTo(5, 0); ctx.lineTo(0, 8); ctx.lineTo(-5, 0);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0; ctx.restore();
}

function drawStars() {
  stars.forEach(s => {
    s.t += s.s * 0.05;
    const alpha = 0.3 + Math.sin(s.t) * 0.3;
    ctx.fillStyle = `rgba(200,180,255,${alpha})`;
    ctx.beginPath(); ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2); ctx.fill();
    s.x -= 0.2;
    if (s.x < 0) { s.x = W; s.y = Math.random() * H; }
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 50;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function rect(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function gameLoop() {
  if (state !== 'play') return;
  frameCount++;
  ctx.clearRect(0, 0, W, H);
  drawStars();

  if (keys['ArrowUp']   || keys['w'] || keys['mobileUp'])    player.y = Math.max(0, player.y - player.speed);
  if (keys['ArrowDown'] || keys['s'] || keys['mobileDown'])  player.y = Math.min(H - player.h, player.y + player.speed);
  if (keys['ArrowLeft'] || keys['a'] || keys['mobileLeft'])  player.x = Math.max(0, player.x - player.speed);
  if (keys['ArrowRight']|| keys['d'] || keys['mobileRight']) player.x = Math.min(W * 0.4, player.x + player.speed);
  if (keys[' '] || keys['mobileShoot']) fireBullet(true);
  if (player.invTime > 0) player.invTime--;

  enemySpawnTimer++;
  const spawnRate = Math.max(55, 140 - level * 8);
  if (enemySpawnTimer >= spawnRate) { spawnEnemy(); enemySpawnTimer = 0; }

  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    if (b.x > W + 20) return false;
    let hit = false;
    enemies = enemies.filter(e => {
      if (hit) return true;
      if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
        e.hp -= b.power;
        spawnParticle(e.x + e.w / 2, e.y + e.h / 2, '#e040a0', 4);
        if (e.hp <= 0) {
          score += 10 * level;
          spawnParticle(e.x + e.w / 2, e.y + e.h / 2, '#e8c96a', 10);
          if (Math.random() < 0.4) crystals.push({ x: e.x + e.w / 2, y: e.y + e.h / 2, w: 12, h: 12, val: 5 });
          if (score > level * 150) level++;
          updateUI();
        }
        hit = true; return e.hp > 0;
      }
      return true;
    });
    return !hit;
  });

  enemies.forEach(e => {
    e.x -= e.speed;
    if (e.type === 'ghost') e.y += Math.sin(frameCount * 0.05 + e.wobble) * 1.5;
    if (e.type === 'bat')   e.y += Math.sin(frameCount * 0.1 + e.wobble) * 2;
    if (rect(player, { x: e.x, y: e.y, w: e.w, h: e.h }) && player.invTime === 0) {
      player.hp = Math.max(0, player.hp - 12);
      player.invTime = 60;
      spawnParticle(player.x + 16, player.y + 14, '#ff4040', 8);
      updateUI();
      if (player.hp <= 0) { state = 'gameover'; showOverlay('game_over'); }
    }
  });
  enemies = enemies.filter(e => e.x > -60);

  crystals = crystals.filter(c => {
    c.x -= 1;
    if (rect(player, { x: c.x - 6, y: c.y - 6, w: 12, h: 12 })) {
      score += c.val; updateUI();
      spawnParticle(c.x, c.y, '#40e0ff', 5);
      return false;
    }
    return c.x > -20;
  });

  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.92; p.vy *= 0.92; p.life--; });
  particles = particles.filter(p => p.life > 0);

  drawParticles();
  crystals.forEach(drawCrystal);
  enemies.forEach(drawEnemy);
  bullets.forEach(drawBullet);
  drawPlayer();
  requestAnimationFrame(gameLoop);
}

function showOverlay(type) {
  const o = document.getElementById('overlay');
  o.querySelector('h2').textContent = '✦ Игра окончена ✦';
  o.querySelector('p').textContent = `Счёт: ${score} | Уровень: ${level}\n\nМонстры победили...`;
  o.querySelector('button').textContent = 'ЗАНОВО';
  o.style.display = 'flex';
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  if (isMobile()) document.getElementById('mobileControls').style.display = 'flex';
  initGame(); state = 'play'; gameLoop();
}

window.startGame = startGame;

document.addEventListener('keydown', e => { keys[e.key] = true; if([' ','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault(); });
document.addEventListener('keyup',  e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  if (state !== 'play') return;
  const r = canvas.getBoundingClientRect();
  const scaleY = H / r.height;
  player.y = Math.max(0, Math.min(H - player.h, (e.clientY - r.top) * scaleY - player.h / 2));
});
canvas.addEventListener('click', () => { if (state === 'play') fireBullet(); });

function setupBtn(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; }, { passive: false });
  el.addEventListener('touchend',   e => { e.preventDefault(); keys[key] = false; }, { passive: false });
}
setupBtn('btnUp',    'mobileUp');
setupBtn('btnDown',  'mobileDown');
setupBtn('btnLeft',  'mobileLeft');
setupBtn('btnRight', 'mobileRight');
setupBtn('fireBtn',  'mobileShoot');
</script>
</body>
</html>
