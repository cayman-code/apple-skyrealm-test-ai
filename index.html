<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="COLONY-7">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <title>COLONY-7</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
    html,body { width:100%; height:100%; overflow:hidden; background:#000; }
    #c { display:block; width:100%; height:100%; }

    /* CRT OVERLAY */
    #crt {
      position:fixed; inset:0; pointer-events:none; z-index:50;
      background:
        repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 1px, transparent 1px, transparent 3px);
      animation: flicker 0.15s infinite;
    }
    @keyframes flicker {
      0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.96} 94%{opacity:1}
    }

    /* VIGNETTE */
    #vig {
      position:fixed; inset:0; pointer-events:none; z-index:49;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.75) 100%);
    }

    /* HUD */
    #hud {
      position:fixed; inset:0; z-index:40; pointer-events:none;
      font-family: 'Courier New', monospace;
      color: #00ff41;
      text-shadow: 0 0 8px #00ff41, 0 0 16px #00ff4155;
    }

    /* TOP BAR */
    #top-bar {
      position:absolute; top:0; left:0; right:0;
      padding: calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;
      display:flex; justify-content:space-between; align-items:flex-start;
      border-bottom: 1px solid rgba(0,255,65,0.2);
      background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
    }
    .sys-block { }
    .sys-title { font-size:11px; color:#00ff4188; letter-spacing:3px; }
    .sys-val { font-size:16px; font-weight:bold; letter-spacing:1px; margin-top:2px; }
    .sys-val.warn { color:#ff6b00; text-shadow: 0 0 8px #ff6b00; animation: pulse 1s infinite; }
    .sys-val.danger { color:#ff0040; text-shadow: 0 0 8px #ff0040; animation: pulse 0.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .stat-row { display:flex; gap:20px; }
    .stat { text-align:center; }
    .stat-l { font-size:9px; color:#00ff4166; letter-spacing:2px; }
    .stat-v { font-size:14px; font-weight:bold; }

    /* COMPASS */
    #compass {
      position:absolute; top: calc(env(safe-area-inset-top,0px) + 10px); left:50%; transform:translateX(-50%);
      font-size:11px; letter-spacing:4px; color:#00ff4188;
      padding:4px 12px;
      border:1px solid rgba(0,255,65,0.2);
      background: rgba(0,0,0,0.5);
      border-radius:4px;
    }

    /* LOG */
    #log {
      position:absolute; bottom:140px; left:16px;
      width:260px; pointer-events:none;
    }
    .log-line {
      font-size:10px; color:#00ff4199; letter-spacing:1px;
      margin-bottom:3px; line-height:1.4;
      animation: logIn 0.3s ease;
    }
    .log-line.warn { color:#ff6b0099; }
    .log-line.danger { color:#ff004099; }
    @keyframes logIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }

    /* ALERT */
    #alert {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:22px; letter-spacing:6px; text-align:center;
      color:#ff0040; text-shadow: 0 0 20px #ff0040;
      opacity:0; transition:opacity 0.3s;
      pointer-events:none;
    }
    #alert.show { opacity:1; animation: alertPulse 0.8s infinite; }
    @keyframes alertPulse { 0%,100%{opacity:1}50%{opacity:0.3} }

    /* BOTTOM CONTROLS */
    #controls {
      position:fixed; bottom:0; left:0; right:0; z-index:40;
      padding:12px 16px calc(12px + env(safe-area-inset-bottom,0px));
      display:flex; align-items:flex-end; justify-content:space-between;
      pointer-events:all;
    }

    /* JOYSTICK */
    #joystick-wrap {
      width:120px; height:120px; position:relative;
    }
    #joystick-base {
      width:120px; height:120px; border-radius:50%;
      border:1px solid rgba(0,255,65,0.25);
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(10px);
      position:relative;
    }
    #joystick-knob {
      width:46px; height:46px; border-radius:50%;
      background:rgba(0,255,65,0.15);
      border:1px solid rgba(0,255,65,0.5);
      box-shadow: 0 0 12px rgba(0,255,65,0.3);
      position:absolute;
      top:50%; left:50%; transform:translate(-50%,-50%);
      transition:none;
    }

    /* ACTION BUTTONS */
    #action-btns {
      display:flex; flex-direction:column; gap:10px; align-items:flex-end;
    }
    .act-btn {
      padding:10px 18px;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(10px);
      border:1px solid rgba(0,255,65,0.3);
      border-radius:6px;
      font-family:'Courier New',monospace;
      font-size:11px; letter-spacing:2px;
      color:#00ff41;
      text-shadow: 0 0 6px #00ff41;
      cursor:pointer;
      transition:all 0.1s;
    }
    .act-btn:active {
      background:rgba(0,255,65,0.15);
      box-shadow: 0 0 16px rgba(0,255,65,0.4);
      transform:scale(0.95);
    }

    /* LOOK BUTTONS */
    #look-btns {
      display:flex; gap:8px; margin-bottom:8px;
    }
    .look-btn {
      width:44px; height:44px;
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(10px);
      border:1px solid rgba(0,255,65,0.25);
      border-radius:6px;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; cursor:pointer; color:#00ff4188;
      transition:all 0.1s;
    }
    .look-btn:active { background:rgba(0,255,65,0.15); transform:scale(0.92); }

    /* SCAN OVERLAY */
    #scan-overlay {
      position:fixed; inset:0; z-index:45; pointer-events:none;
      border:2px solid #00ff41;
      box-shadow: inset 0 0 40px rgba(0,255,65,0.1);
      opacity:0; transition:opacity 0.3s;
    }
    #scan-overlay.show { opacity:1; animation:scanAnim 2s linear; }
    @keyframes scanAnim {
      0%{opacity:0} 10%{opacity:1} 80%{opacity:1} 100%{opacity:0}
    }
    #scan-line {
      position:absolute; left:0; right:0; height:2px;
      background: linear-gradient(90deg, transparent, #00ff41, transparent);
      box-shadow: 0 0 10px #00ff41;
      animation: scanLine 2s linear infinite;
    }
    @keyframes scanLine { from{top:0} to{top:100%} }

    /* LOADING */
    #loading {
      position:fixed; inset:0; z-index:100;
      background:#000; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:'Courier New',monospace; color:#00ff41;
      text-shadow: 0 0 10px #00ff41;
    }
    #loading h1 { font-size:28px; letter-spacing:8px; margin-bottom:8px; }
    #loading p { font-size:11px; letter-spacing:3px; color:#00ff4166; margin-bottom:30px; }
    #load-bar-wrap { width:200px; height:2px; background:rgba(0,255,65,0.2); }
    #load-bar { height:100%; background:#00ff41; width:0%; transition:width 0.1s; box-shadow:0 0 8px #00ff41; }
    #load-text { font-size:10px; letter-spacing:2px; color:#00ff4155; margin-top:10px; }
  </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading">
  <h1>COLONY-7</h1>
  <p>PLANETARY COLONIZATION SYSTEM v0.1</p>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
  <div id="load-text">ИНИЦИАЛИЗАЦИЯ...</div>
</div>

<canvas id="c"></canvas>
<div id="crt"></div>
<div id="vig"></div>

<!-- SCAN OVERLAY -->
<div id="scan-overlay"><div id="scan-line"></div></div>

<!-- HUD -->
<div id="hud">
  <div id="top-bar">
    <div class="sys-block">
      <div class="sys-title">O2 LEVEL</div>
      <div class="sys-val" id="o2-val">94%</div>
    </div>
    <div class="stat-row">
      <div class="stat">
        <div class="stat-l">ЭНЕРГИЯ</div>
        <div class="stat-v" id="energy-val">847</div>
      </div>
      <div class="stat">
        <div class="stat-l">МЕТАЛЛ</div>
        <div class="stat-v" id="metal-val">0</div>
      </div>
      <div class="stat">
        <div class="stat-l">КРИСТАЛЛ</div>
        <div class="stat-v" id="crystal-val">0</div>
      </div>
    </div>
    <div class="sys-block" style="text-align:right">
      <div class="sys-title">УГРОЗА</div>
      <div class="sys-val" id="threat-val">LOW</div>
    </div>
  </div>
  <div id="compass">N &nbsp; NE &nbsp; E &nbsp; SE &nbsp; S</div>
  <div id="log"></div>
  <div id="alert">⚠ ОБЪЕКТ ОБНАРУЖЕН ⚠</div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <div>
    <div id="look-btns">
      <div class="look-btn" id="look-l">◀</div>
      <div class="look-btn" id="look-r">▶</div>
    </div>
    <div id="joystick-wrap">
      <div id="joystick-base">
        <div id="joystick-knob"></div>
      </div>
    </div>
  </div>
  <div id="action-btns">
    <div class="act-btn" onclick="doScan()">[ СКАНИРОВАТЬ ]</div>
    <div class="act-btn" onclick="doMine()">[ ДОБЫВАТЬ ]</div>
    <div class="act-btn" onclick="doBuild()">[ СТРОИТЬ ]</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===== SAVE/LOAD =====
const SAVE_KEY = 'colony7_v1';
function loadSave() {
  try { const r = localStorage.getItem(SAVE_KEY); if(r) return JSON.parse(r); } catch(e){}
  return null;
}
function doSave() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      pos: { x: player.position.x, z: player.position.z },
      res: resources,
      buildings: buildings.map(b => ({ x:b.position.x, z:b.position.z, type:b.userData.type })),
      o2: o2Level, energy: resources.energy,
    }));
  } catch(e){}
}

// ===== LOADING SEQUENCE =====
const loadMsgs = [
  'ЗАГРУЗКА КАРТЫ ПЛАНЕТЫ...',
  'КАЛИБРОВКА АТМОСФЕРНЫХ ДАТЧИКОВ...',
  'ИНИЦИАЛИЗАЦИЯ ДВИГАТЕЛЕЙ...',
  'СКАНИРОВАНИЕ ПОВЕРХНОСТИ...',
  'ОБНАРУЖЕНИЕ АНОМАЛИЙ...',
  'СИСТЕМА ГОТОВА. УДАЧИ, КОЛОНИСТ.',
];
let loadIdx = 0;
const loadBar = document.getElementById('load-bar');
const loadText = document.getElementById('load-text');
function animateLoad(cb) {
  let pct = 0;
  const iv = setInterval(() => {
    pct += Math.random() * 15 + 5;
    if (pct > 100) pct = 100;
    loadBar.style.width = pct + '%';
    loadText.textContent = loadMsgs[Math.floor(pct / 100 * (loadMsgs.length-1))];
    if (pct >= 100) { clearInterval(iv); setTimeout(cb, 600); }
  }, 120);
}

// ===== THREE.JS SETUP =====
let scene, camera, renderer, player, playerBody;
let terrain, buildings = [], resources = { metal:0, crystal:0, energy:847 };
let o2Level = 94, threatLevel = 0;
let moveJoy = { x:0, y:0 }, lookDir = 0;
let clock, entities = [], particles = [];
const SAVED = loadSave();

function init() {
  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050008);
  scene.fog = new THREE.FogExp2(0x0a0014, 0.045);

  // Renderer — PS1 style: low res
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio * 0.5, 1)); // intentionally low res
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.BasicShadowMap;

  // Camera
  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 200);

  clock = new THREE.Clock();

  buildWorld();
  buildPlayer();
  buildEntities();
  buildLights();

  if (SAVED) {
    player.position.x = SAVED.pos.x;
    player.position.z = SAVED.pos.z;
    resources = SAVED.res || resources;
    o2Level = SAVED.o2 || 94;
    if (SAVED.buildings) {
      SAVED.buildings.forEach(b => spawnBuilding(b.x, b.z, b.type));
    }
    updateHUD();
  }

  window.addEventListener('resize', onResize);
  setupJoystick();
  setupLookBtns();
  loop();
}

// ===== WORLD =====
function buildWorld() {
  // Ground — low poly terrain
  const geo = new THREE.PlaneGeometry(200, 200, 30, 30);
  geo.rotateX(-Math.PI/2);
  const pos = geo.attributes.position;

  // Displace vertices for terrain — PS1 style chunky
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    if (Math.abs(x) < 8 && Math.abs(z) < 8) continue; // flat center
    const h = (Math.sin(x*0.15)*Math.cos(z*0.12) + Math.sin(x*0.3+1)*0.5 + Math.cos(z*0.25+2)*0.4) * 2.5;
    pos.setY(i, h);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();

  // Vertex colors — alien soil
  const colors = [];
  for (let i = 0; i < pos.count; i++) {
    const y = pos.getY(i);
    const r = 0.08 + y * 0.02, g = 0.04, b = 0.12 + y * 0.015;
    colors.push(r, g, b);
  }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

  const mat = new THREE.MeshLambertMaterial({ vertexColors: true });
  terrain = new THREE.Mesh(geo, mat);
  terrain.receiveShadow = true;
  scene.add(terrain);

  // Rocks
  for (let i = 0; i < 60; i++) {
    const x = (Math.random()-0.5)*160, z = (Math.random()-0.5)*160;
    if (Math.abs(x)<10 && Math.abs(z)<10) continue;
    spawnRock(x, z);
  }

  // Crystals
  for (let i = 0; i < 20; i++) {
    const x = (Math.random()-0.5)*140, z = (Math.random()-0.5)*140;
    if (Math.abs(x)<12 && Math.abs(z)<12) continue;
    spawnCrystal(x, z);
  }

  // Strange monoliths
  for (let i = 0; i < 6; i++) {
    const angle = (i/6)*Math.PI*2;
    const r = 30 + Math.random()*20;
    spawnMonolith(Math.cos(angle)*r, Math.sin(angle)*r);
  }

  // Starting platform
  const platGeo = new THREE.BoxGeometry(8, 0.3, 8);
  const platMat = new THREE.MeshLambertMaterial({ color: 0x1a1a2e });
  const plat = new THREE.Mesh(platGeo, platMat);
  plat.position.set(0, 0.15, 0);
  scene.add(plat);

  // Stars (particles in sky)
  const starGeo = new THREE.BufferGeometry();
  const starVerts = [];
  for (let i = 0; i < 800; i++) {
    starVerts.push((Math.random()-0.5)*400, 30+Math.random()*60, (Math.random()-0.5)*400);
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
  const starMat = new THREE.PointsMaterial({ color:0x8866ff, size:0.3, sizeAttenuation:true });
  scene.add(new THREE.Points(starGeo, starMat));

  // Alien planet in sky
  const planetGeo = new THREE.SphereGeometry(8, 6, 6); // low poly
  const planetMat = new THREE.MeshLambertMaterial({ color: 0x3d0066, wireframe: false });
  const planet = new THREE.Mesh(planetGeo, planetMat);
  planet.position.set(-40, 50, -80);
  scene.add(planet);

  // Rings around planet
  const ringGeo = new THREE.TorusGeometry(12, 0.4, 3, 20);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x660033, wireframe:true });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(planet.position);
  ring.rotation.x = Math.PI/3;
  scene.add(ring);
}

function spawnRock(x, z) {
  const s = 0.3 + Math.random()*1.2;
  const geo = new THREE.DodecahedronGeometry(s, 0); // 0 = low poly
  const mat = new THREE.MeshLambertMaterial({ color: new THREE.Color(0.15, 0.1, 0.2) });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, s*0.4, z);
  mesh.rotation.set(Math.random(), Math.random(), Math.random());
  mesh.castShadow = true;
  mesh.userData = { type:'rock', mineable:true };
  scene.add(mesh);
  return mesh;
}

function spawnCrystal(x, z) {
  const h = 0.5 + Math.random()*1.5;
  const geo = new THREE.ConeGeometry(0.15, h, 4, 1); // 4 sides = very angular
  const mat = new THREE.MeshLambertMaterial({
    color: new THREE.Color(0.1, 0.8, 0.6),
    emissive: new THREE.Color(0, 0.2, 0.15),
  });
  const group = new THREE.Group();
  const count = 2 + Math.floor(Math.random()*3);
  for (let i = 0; i < count; i++) {
    const m = new THREE.Mesh(geo, mat);
    m.position.set((Math.random()-0.5)*0.4, h/2, (Math.random()-0.5)*0.4);
    m.rotation.set((Math.random()-0.5)*0.3, Math.random()*Math.PI, (Math.random()-0.5)*0.3);
    group.add(m);
  }
  group.position.set(x, 0, z);
  group.userData = { type:'crystal', mineable:true };
  scene.add(group);
  // glow light
  const light = new THREE.PointLight(0x00ffcc, 0.6, 5);
  light.position.set(x, 0.8, z);
  scene.add(light);
  group.userData.light = light;
  return group;
}

function spawnMonolith(x, z) {
  const h = 4 + Math.random()*6;
  const geo = new THREE.BoxGeometry(0.6, h, 0.6);
  const mat = new THREE.MeshLambertMaterial({ color: 0x050010 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h/2, z);
  mesh.rotation.y = Math.random()*Math.PI;
  mesh.userData = { type:'monolith' };
  scene.add(mesh);
  // Eerie glow
  const gl = new THREE.PointLight(0x6600ff, 0.8, 8);
  gl.position.set(x, 1, z);
  scene.add(gl);
}

// ===== PLAYER =====
function buildPlayer() {
  player = new THREE.Group();
  // Body — boxy PS1 style
  const bodyGeo = new THREE.BoxGeometry(0.5, 0.8, 0.3);
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0x223344 });
  playerBody = new THREE.Mesh(bodyGeo, bodyMat);
  playerBody.position.y = 0.4;
  player.add(playerBody);
  // Helmet
  const helmGeo = new THREE.BoxGeometry(0.45, 0.4, 0.45);
  const helmMat = new THREE.MeshLambertMaterial({ color: 0x334455 });
  const helm = new THREE.Mesh(helmGeo, helmMat);
  helm.position.y = 1.05;
  player.add(helm);
  // Visor
  const visGeo = new THREE.BoxGeometry(0.35, 0.15, 0.1);
  const visMat = new THREE.MeshLambertMaterial({ color:0x00aaff, emissive:new THREE.Color(0,0.2,0.4) });
  const vis = new THREE.Mesh(visGeo, visMat);
  vis.position.set(0, 1.05, 0.23);
  player.add(vis);
  // Headlamp
  const lamp = new THREE.PointLight(0x88aaff, 1.5, 12);
  lamp.position.set(0, 1.1, 0.3);
  player.add(lamp);

  player.position.set(SAVED ? SAVED.pos.x : 0, 0, SAVED ? SAVED.pos.z : 0);
  player.castShadow = true;
  scene.add(player);

  // Camera offset
  camera.position.set(0, 2, 5);
  player.add(camera);
}

// ===== ENTITIES =====
function buildEntities() {
  for (let i = 0; i < 5; i++) {
    const angle = (i/5)*Math.PI*2 + Math.random();
    const r = 25 + Math.random()*30;
    spawnEntity(Math.cos(angle)*r, Math.sin(angle)*r);
  }
}

function spawnEntity(x, z) {
  const group = new THREE.Group();
  // Tall thin alien
  const bodyGeo = new THREE.BoxGeometry(0.4, 1.4, 0.2);
  const mat = new THREE.MeshLambertMaterial({ color: 0x1a0033 });
  const body = new THREE.Mesh(bodyGeo, mat);
  body.position.y = 0.7;
  group.add(body);
  // Head
  const headGeo = new THREE.SphereGeometry(0.25, 4, 4); // very low poly
  const headMat = new THREE.MeshLambertMaterial({ color: 0x0d001a });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.65;
  group.add(head);
  // Eyes — glowing
  const eyeGeo = new THREE.SphereGeometry(0.06, 4, 4);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0040 });
  const e1 = new THREE.Mesh(eyeGeo, eyeMat);
  e1.position.set(-0.1, 1.7, 0.2);
  const e2 = new THREE.Mesh(eyeGeo, eyeMat.clone());
  e2.position.set(0.1, 1.7, 0.2);
  group.add(e1, e2);
  // Eye glow
  const eyeLight = new THREE.PointLight(0xff0040, 0.5, 3);
  eyeLight.position.set(0, 1.7, 0.2);
  group.add(eyeLight);

  group.position.set(x, 0, z);
  group.userData = { type:'entity', phase: Math.random()*Math.PI*2, baseX:x, baseZ:z, eyeLight };
  scene.add(group);
  entities.push(group);
}

// ===== LIGHTS =====
function buildLights() {
  // Very dim ambient — eerie
  scene.add(new THREE.AmbientLight(0x110022, 0.8));
  // Main "moonlight" from alien planet
  const dir = new THREE.DirectionalLight(0x3300aa, 0.6);
  dir.position.set(-30, 40, -50);
  dir.castShadow = true;
  scene.add(dir);
  // Red rim light from horizon
  const rim = new THREE.DirectionalLight(0x330011, 0.4);
  rim.position.set(50, 5, 50);
  scene.add(rim);
}

// ===== BUILDINGS =====
const BUILDING_DEFS = {
  base:    { color:0x1a2233, h:2.5, label:'База' },
  drill:   { color:0x223322, h:3,   label:'Бурильня' },
  antenna: { color:0x332222, h:5,   label:'Антенна' },
};
let nextBuilding = 'base';

function spawnBuilding(x, z, type) {
  type = type || nextBuilding;
  const def = BUILDING_DEFS[type] || BUILDING_DEFS.base;
  const geo = new THREE.BoxGeometry(2, def.h, 2);
  const mat = new THREE.MeshLambertMaterial({ color: def.color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, def.h/2, z);
  mesh.userData = { type };
  scene.add(mesh);
  buildings.push(mesh);
  // Light on building
  const bl = new THREE.PointLight(0x00aaff, 0.8, 6);
  bl.position.set(x, def.h + 0.5, z);
  scene.add(bl);
  return mesh;
}

// ===== HUD / LOG =====
const logEl = document.getElementById('log');
const logLines = [];
function addLog(msg, type='') {
  const d = document.createElement('div');
  d.className = 'log-line ' + type;
  d.textContent = '> ' + msg;
  logEl.appendChild(d);
  logLines.push(d);
  if (logLines.length > 6) { logEl.removeChild(logLines.shift()); }
}

function updateHUD() {
  const o2El = document.getElementById('o2-val');
  o2El.textContent = Math.round(o2Level) + '%';
  o2El.className = 'sys-val' + (o2Level < 30 ? ' danger' : o2Level < 60 ? ' warn' : '');
  document.getElementById('energy-val').textContent = Math.round(resources.energy);
  document.getElementById('metal-val').textContent = resources.metal;
  document.getElementById('crystal-val').textContent = resources.crystal;
  const tEl = document.getElementById('threat-val');
  tEl.textContent = threatLevel > 2 ? 'HIGH' : threatLevel > 0 ? 'MED' : 'LOW';
  tEl.className = 'sys-val' + (threatLevel > 2 ? ' danger' : threatLevel > 0 ? ' warn' : '');
}

// ===== ACTIONS =====
let scanCooldown = 0;
function doScan() {
  if (scanCooldown > 0) return;
  scanCooldown = 5;
  const overlay = document.getElementById('scan-overlay');
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 2000);
  // Find nearest object
  let nearest = null, nearDist = 999;
  scene.children.forEach(obj => {
    if (!obj.userData.type) return;
    const d = obj.position.distanceTo(player.position);
    if (d < nearDist) { nearDist = d; nearest = obj; }
  });
  if (nearest && nearDist < 40) {
    const msgs = {
      rock: `ОБНАРУЖЕН МЕТАЛЛ НА ${Math.round(nearDist)}М`,
      crystal: `КРИСТАЛЛЫ НА ${Math.round(nearDist)}М`,
      monolith: `АНОМАЛИЯ НА ${Math.round(nearDist)}М`,
      entity: `⚠ БИОСИГНАЛ НА ${Math.round(nearDist)}М`,
    };
    addLog(msgs[nearest.userData.type] || 'ОБЪЕКТ ОБНАРУЖЕН', nearest.userData.type === 'entity' ? 'danger' : 'warn');
    if (nearest.userData.type === 'entity') {
      threatLevel = Math.min(3, threatLevel + 1);
      showAlert();
    }
  } else {
    addLog('ЗОНА ЧИСТА. ДВИЖЕНИЙ НЕТ.');
  }
  updateHUD();
}

function doMine() {
  // Find nearest mineable object
  let nearest = null, nearDist = 999;
  scene.children.forEach(obj => {
    if (!obj.userData.mineable) return;
    const d = obj.position.distanceTo(player.position);
    if (d < nearDist && d < 6) { nearDist = d; nearest = obj; }
  });
  if (!nearest) { addLog('НЕТ РЕСУРСОВ ПОБЛИЗОСТИ', 'warn'); return; }
  if (nearest.userData.type === 'rock') {
    resources.metal += 2 + Math.floor(Math.random()*3);
    addLog(`+${2} МЕТАЛЛА ДОБЫТО`);
  } else if (nearest.userData.type === 'crystal') {
    resources.crystal += 1 + Math.floor(Math.random()*2);
    addLog(`+1 КРИСТАЛЛ ДОБЫТ`);
    resources.energy += 50;
    addLog(`+50 ЭНЕРГИИ`);
  }
  scene.remove(nearest);
  if (nearest.userData.light) scene.remove(nearest.userData.light);
  spawnMineParticles(nearest.position);
  updateHUD();
  doSave();
}

function doBuild() {
  const types = Object.keys(BUILDING_DEFS);
  nextBuilding = types[(types.indexOf(nextBuilding)+1) % types.length];
  addLog(`ВЫБРАНО: ${BUILDING_DEFS[nextBuilding].label.toUpperCase()}`);
  // Place at player pos offset
  const bx = player.position.x + Math.sin(player.rotation.y)*4;
  const bz = player.position.z + Math.cos(player.rotation.y)*4;
  spawnBuilding(bx, bz, nextBuilding);
  addLog(`${BUILDING_DEFS[nextBuilding].label.toUpperCase()} ПОСТРОЕНА`);
  spawnBuildParticles(new THREE.Vector3(bx, 1, bz));
  doSave();
}

function spawnMineParticles(pos) {
  for (let i = 0; i < 8; i++) {
    const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    const mat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    p.userData = {
      vx:(Math.random()-0.5)*0.2, vy:0.1+Math.random()*0.15, vz:(Math.random()-0.5)*0.2,
      life:30
    };
    scene.add(p); particles.push(p);
  }
}
function spawnBuildParticles(pos) {
  for (let i = 0; i < 12; i++) {
    const geo = new THREE.BoxGeometry(0.08, 0.08, 0.08);
    const mat = new THREE.MeshBasicMaterial({ color: 0x4488ff });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    p.userData = {
      vx:(Math.random()-0.5)*0.25, vy:0.12+Math.random()*0.18, vz:(Math.random()-0.5)*0.25,
      life:40
    };
    scene.add(p); particles.push(p);
  }
}

let alertTimer = null;
function showAlert() {
  const el = document.getElementById('alert');
  el.classList.add('show');
  clearTimeout(alertTimer);
  alertTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ===== JOYSTICK =====
function setupJoystick() {
  const base = document.getElementById('joystick-base');
  const knob = document.getElementById('joystick-knob');
  const R = 37;
  let active = false, tid = null;

  function onStart(e) {
    active = true; tid = e.targetTouches ? e.targetTouches[0].identifier : null;
    e.preventDefault();
  }
  function onMove(e) {
    if (!active) return;
    e.preventDefault();
    const touch = e.targetTouches ? Array.from(e.targetTouches).find(t=>t.identifier===tid)||e.targetTouches[0] : e;
    const rect = base.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    let dx = touch.clientX - cx, dy = touch.clientY - cy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist > R) { dx = dx/dist*R; dy = dy/dist*R; }
    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    moveJoy.x = dx/R; moveJoy.y = dy/R;
  }
  function onEnd() {
    active = false;
    knob.style.transform = 'translate(-50%,-50%)';
    moveJoy.x = 0; moveJoy.y = 0;
  }
  base.addEventListener('touchstart', onStart, {passive:false});
  window.addEventListener('touchmove', onMove, {passive:false});
  window.addEventListener('touchend', onEnd);
  base.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', e => { if(active) onMove(e); });
  window.addEventListener('mouseup', onEnd);
}

// ===== LOOK BUTTONS =====
function setupLookBtns() {
  const ll = document.getElementById('look-l');
  const lr = document.getElementById('look-r');
  let lTimer = null, rTimer = null;
  const startLook = (dir, el) => {
    el.classList.add('pressed');
    return setInterval(() => { player.rotation.y += dir * 0.06; }, 16);
  };
  ll.addEventListener('touchstart', e=>{e.preventDefault();lTimer=startLook(1,ll);},{passive:false});
  ll.addEventListener('touchend', ()=>{clearInterval(lTimer);ll.classList.remove('pressed');});
  lr.addEventListener('touchstart', e=>{e.preventDefault();rTimer=startLook(-1,lr);},{passive:false});
  lr.addEventListener('touchend', ()=>{clearInterval(rTimer);lr.classList.remove('pressed');});
  ll.addEventListener('mousedown', ()=>lTimer=startLook(1,ll));
  ll.addEventListener('mouseup', ()=>{clearInterval(lTimer);ll.classList.remove('pressed');});
  lr.addEventListener('mousedown', ()=>rTimer=startLook(-1,lr));
  lr.addEventListener('mouseup', ()=>{clearInterval(rTimer);lr.classList.remove('pressed');});
}

// ===== KEYBOARD =====
const keys = {};
window.addEventListener('keydown', e=>keys[e.key]=true);
window.addEventListener('keyup', e=>keys[e.key]=false);

// ===== RESIZE =====
function onResize() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ===== GAME LOOP =====
let logTimer = 0, o2Timer = 0, saveTimer = 0;
const SPEED = 5;

function loop() {
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // PLAYER MOVEMENT
  const jx = moveJoy.x + (keys['d']||keys['ArrowRight']?1:0) - (keys['a']||keys['ArrowLeft']?1:0);
  const jy = moveJoy.y + (keys['s']||keys['ArrowDown']?1:0) - (keys['w']||keys['ArrowUp']?1:0);
  if (keys['q']) player.rotation.y += 0.04;
  if (keys['e']) player.rotation.y -= 0.04;

  if (Math.abs(jx)>0.05 || Math.abs(jy)>0.05) {
    const forward = new THREE.Vector3(-Math.sin(player.rotation.y), 0, -Math.cos(player.rotation.y));
    const right = new THREE.Vector3(-Math.cos(player.rotation.y), 0, Math.sin(player.rotation.y));
    const move = forward.multiplyScalar(-jy).add(right.multiplyScalar(jx));
    move.normalize().multiplyScalar(SPEED * dt);
    player.position.add(move);
    // Bound to map
    player.position.x = Math.max(-95, Math.min(95, player.position.x));
    player.position.z = Math.max(-95, Math.min(95, player.position.z));
    // Bob animation
    playerBody.position.y = 0.4 + Math.sin(t*8)*0.03;
  }

  // TERRAIN HEIGHT follow
  // simple raycast approximation
  const px = player.position.x, pz = player.position.z;
  const hy = (Math.sin(px*0.15)*Math.cos(pz*0.12) + Math.sin(px*0.3+1)*0.5 + Math.cos(pz*0.25+2)*0.4) * 2.5;
  player.position.y = Math.max(0, hy);

  // ENTITIES — idle sway + face player
  entities.forEach(e => {
    e.userData.phase += dt * 0.5;
    e.position.x = e.userData.baseX + Math.sin(e.userData.phase)*0.3;
    e.children[0] && (e.children[0].rotation.z = Math.sin(e.userData.phase*1.3)*0.05);
    // Slowly turn toward player
    const dx = player.position.x - e.position.x;
    const dz = player.position.z - e.position.z;
    const targetAngle = Math.atan2(dx, dz);
    e.rotation.y += (targetAngle - e.rotation.y) * 0.01;
    // Eye flicker
    if (e.userData.eyeLight) {
      e.userData.eyeLight.intensity = 0.3 + Math.sin(t*3 + e.userData.phase)*0.3;
    }
    // Threat if close
    const dist = Math.sqrt(dx*dx+dz*dz);
    if (dist < 8 && Math.random() < 0.002) { showAlert(); addLog('⚠ ОНИ ПРИБЛИЖАЮТСЯ', 'danger'); }
  });

  // CRYSTAL GLOW
  scene.children.forEach(obj => {
    if (obj.userData.type === 'crystal' && obj.userData.light) {
      obj.userData.light.intensity = 0.4 + Math.sin(t*2 + obj.position.x)*0.3;
    }
  });

  // PARTICLES
  particles = particles.filter(p => {
    p.userData.life--;
    p.position.x += p.userData.vx;
    p.position.y += p.userData.vy;
    p.position.z += p.userData.vz;
    p.userData.vy -= 0.008;
    p.material.opacity = p.userData.life / 40;
    if (p.userData.life <= 0) { scene.remove(p); return false; }
    return true;
  });

  // O2 decay
  o2Timer += dt;
  if (o2Timer > 5) {
    o2Timer = 0;
    o2Level = Math.max(0, o2Level - 0.3);
    resources.energy -= 0.5;
    if (o2Level < 30 && Math.random() < 0.3) addLog('⚠ КИСЛОРОД КРИТИЧЕСКИ НИЗКИЙ', 'danger');
    updateHUD();
  }

  // Scan cooldown
  if (scanCooldown > 0) scanCooldown -= dt;

  // Random log messages
  logTimer += dt;
  if (logTimer > 12 + Math.random()*8) {
    logTimer = 0;
    const msgs = [
      ['АТМОСФЕРНОЕ ДАВЛЕНИЕ В НОРМЕ', ''],
      ['ОБНАРУЖЕНЫ СЛЕДЫ НА ПОВЕРХНОСТИ', 'warn'],
      ['СИГНАЛ С ОРБИТЫ ПОТЕРЯН', 'warn'],
      ['ДВИЖЕНИЕ НА ПЕРИФЕРИИ СЕНСОРА', 'danger'],
      ['ТЕМПЕРАТУРА: -47°C', ''],
      ['БАЗА ЗАФИКСИРОВАЛА ВИБРАЦИЮ', 'warn'],
    ];
    const m = msgs[Math.floor(Math.random()*msgs.length)];
    addLog(m[0], m[1]);
  }

  // Compass
  const angle = player.rotation.y;
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  const di = Math.round((-angle/Math.PI*4 + 8)) % 8;
  document.getElementById('compass').textContent = dirs[di];

  // Save periodically
  saveTimer += dt;
  if (saveTimer > 30) { saveTimer = 0; doSave(); }

  renderer.render(scene, camera);
}

// ===== START =====
animateLoad(() => {
  document.getElementById('loading').style.display = 'none';
  init();
  addLog('ПОСАДКА ЗАВЕРШЕНА. ДОБРО ПОЖАЛОВАТЬ НА KR-7.');
  addLog('РЕСУРСЫ ОБНАРУЖЕНЫ НА СЕВЕРЕ.', 'warn');
  setTimeout(() => addLog('ДВИЖЕНИЕ НА РАДАРЕ...', 'danger'), 4000);
});
